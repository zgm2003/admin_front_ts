name: Deploy dist to Baota

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22.12.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build frontend
        env:
          VITE_GO_API_BASE_URL: ${{ secrets.VITE_GO_API_BASE_URL || vars.VITE_GO_API_BASE_URL }}
          VITE_WEB_SOCKET_URL: ${{ secrets.VITE_WEB_SOCKET_URL || vars.VITE_WEB_SOCKET_URL }}
          VITE_PLATFORM: ${{ vars.VITE_PLATFORM || 'admin' }}
        run: |
          set -euo pipefail

          load_production_default() {
            local key="$1"
            local current
            current="$(printenv "$key" || true)"
            if [ -n "$current" ]; then
              return
            fi
            if [ ! -f .env.production ]; then
              return
            fi

            local value
            value="$(grep -E "^${key}=" .env.production | tail -n 1 | cut -d= -f2-)"
            if [ -n "$value" ]; then
              export "$key=$value"
            fi
          }

          load_production_default VITE_GO_API_BASE_URL
          load_production_default VITE_WEB_SOCKET_URL
          export VITE_PLATFORM="${VITE_PLATFORM:-admin}"

          : "${VITE_GO_API_BASE_URL:?VITE_GO_API_BASE_URL GitHub secret/variable or .env.production value is required}"
          : "${VITE_WEB_SOCKET_URL:?VITE_WEB_SOCKET_URL GitHub secret/variable or .env.production value is required}"

          npm run build

      - run: tar -czf dist.tar.gz -C dist .

      - name: Upload dist to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          require_deploy_env() {
            local key="$1"
            local value
            value="$(printenv "$key" || true)"
            if [ -n "$value" ]; then
              return
            fi
            echo "::error title=Missing deploy config::${key} GitHub secret or variable is required"
            exit 1
          }

          require_deploy_env SSH_HOST
          require_deploy_env SSH_PORT
          require_deploy_env SSH_USER
          require_deploy_env DEPLOY_PATH

          if [ -z "${SSH_PRIVATE_KEY:-}" ] && [ -z "${SSH_PASSWORD:-}" ]; then
            echo "::error title=Missing deploy credential::SSH_PRIVATE_KEY or SSH_PASSWORD GitHub secret is required"
            exit 1
          fi
          if [ "$DEPLOY_PATH" = "/" ]; then
            echo "::error title=Invalid deploy path::DEPLOY_PATH must not be /"
            exit 1
          fi

          mkdir -p ~/.ssh
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

          SSH_PREFIX=()
          SSH_OPTIONS=(-o StrictHostKeyChecking=yes)
          if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            SSH_OPTIONS+=(-i ~/.ssh/id_rsa)
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq sshpass
            export SSHPASS="$SSH_PASSWORD"
            SSH_PREFIX=(sshpass -e)
          fi

          "${SSH_PREFIX[@]}" scp "${SSH_OPTIONS[@]}" -P "$SSH_PORT" dist.tar.gz "$SSH_USER@$SSH_HOST:/tmp/admin_front_ts_dist.tar.gz"

          REMOTE_DEPLOY_PATH="$(printf '%q' "$DEPLOY_PATH")"
          "${SSH_PREFIX[@]}" ssh "${SSH_OPTIONS[@]}" -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "DEPLOY_PATH=$REMOTE_DEPLOY_PATH bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "$DEPLOY_PATH"
          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 \
            ! -name ".user.ini" \
            ! -name ".htaccess" \
            ! -name ".well-known" \
            -exec rm -rf {} +

          tar -xzf /tmp/admin_front_ts_dist.tar.gz -C "$DEPLOY_PATH"
          rm -f /tmp/admin_front_ts_dist.tar.gz

          chown -R www:www "$DEPLOY_PATH" || true
          echo "dist deployed to $DEPLOY_PATH"
          EOF
