name: Deploy dist to Baota

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22.12.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run build

      - run: tar -czf dist.tar.gz -C dist .

      - name: Upload dist to server
        env:
          SSH_HOST: 118.126.104.244
          SSH_PORT: 22
          SSH_USER: root
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

          scp -P "$SSH_PORT" dist.tar.gz "$SSH_USER@$SSH_HOST:/tmp/admin_front_ts_dist.tar.gz"

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "bash -s" <<'EOF'
          set -euo pipefail

          DEPLOY_PATH="/www/wwwroot/zgm2003.cn"

          mkdir -p "$DEPLOY_PATH"
          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 \
            ! -name ".user.ini" \
            ! -name ".htaccess" \
            ! -name ".well-known" \
            -exec rm -rf {} +

          tar -xzf /tmp/admin_front_ts_dist.tar.gz -C "$DEPLOY_PATH"
          rm -f /tmp/admin_front_ts_dist.tar.gz

          chown -R www:www "$DEPLOY_PATH" || true
          echo "dist deployed to $DEPLOY_PATH"
          EOF
