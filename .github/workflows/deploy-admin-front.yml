name: Deploy dist to Baota

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22.12.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build frontend
        env:
          VITE_GO_API_BASE_URL: ${{ secrets.VITE_GO_API_BASE_URL || vars.VITE_GO_API_BASE_URL }}
          VITE_WEB_SOCKET_URL: ${{ secrets.VITE_WEB_SOCKET_URL || vars.VITE_WEB_SOCKET_URL }}
          VITE_PLATFORM: ${{ vars.VITE_PLATFORM || 'admin' }}
        run: |
          set -euo pipefail

          : "${VITE_GO_API_BASE_URL:?VITE_GO_API_BASE_URL GitHub secret or variable is required}"
          : "${VITE_WEB_SOCKET_URL:?VITE_WEB_SOCKET_URL GitHub secret or variable is required}"

          npm run build

      - run: tar -czf dist.tar.gz -C dist .

      - name: Upload dist to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          : "${SSH_HOST:?SSH_HOST GitHub secret or variable is required}"
          : "${SSH_PORT:?SSH_PORT GitHub secret or variable is required}"
          : "${SSH_USER:?SSH_USER GitHub secret or variable is required}"
          : "${SSH_PRIVATE_KEY:?SSH_PRIVATE_KEY GitHub secret is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH GitHub secret or variable is required}"
          if [ "$DEPLOY_PATH" = "/" ]; then
            echo "DEPLOY_PATH must not be /"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

          scp -P "$SSH_PORT" dist.tar.gz "$SSH_USER@$SSH_HOST:/tmp/admin_front_ts_dist.tar.gz"

          REMOTE_DEPLOY_PATH="$(printf '%q' "$DEPLOY_PATH")"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "DEPLOY_PATH=$REMOTE_DEPLOY_PATH bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "$DEPLOY_PATH"
          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 \
            ! -name ".user.ini" \
            ! -name ".htaccess" \
            ! -name ".well-known" \
            -exec rm -rf {} +

          tar -xzf /tmp/admin_front_ts_dist.tar.gz -C "$DEPLOY_PATH"
          rm -f /tmp/admin_front_ts_dist.tar.gz

          chown -R www:www "$DEPLOY_PATH" || true
          echo "dist deployed to $DEPLOY_PATH"
          EOF
